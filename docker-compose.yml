services:
  api:
    build:
      context: .
      dockerfile: src/TractorTracker.Api/Dockerfile
    container_name: tractortracker-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__Default: "Host=cedpich-postgis-db;Port=5432;Database=${DB_NAME:?required};Username=${DB_USER:?required};Password=${DB_PASSWORD:?required}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cedpich-db
      - tractortracker-internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=
        - VITE_MACHINE_ID=${MACHINE_ID:?required}
    container_name: tractortracker-frontend
    restart: unless-stopped
    environment:
      VIRTUAL_HOST: ${VIRTUAL_HOST:?required}
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: ${VIRTUAL_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?required}
    depends_on:
      - api
    networks:
      - nginx-proxy
      - tractortracker-internal

networks:
  nginx-proxy:
    external: true
  cedpich-db:
    external: true
  tractortracker-internal:
    driver: bridge
