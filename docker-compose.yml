services:
  api:
    build:
      context: .
      dockerfile: src/TractorTracker.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Host=db;Port=5432;Database=tractortracker;Username=postgres;Password=${POSTGRES_PASSWORD}
      - Ticatag__ApiKey=${TICATAG_API_KEY}
      - AllowedOrigins__0=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
        - VITE_MACHINE_ID=${MACHINE_ID}
    ports:
      - "3000:80"
    depends_on:
      - api

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: tractortracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
